name: Build macOS

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 24.13.0

jobs:
  build-macos:
    name: macOS ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate app icon
        run: npm run make-icon

      - name: Build macOS ${{ matrix.arch }} package
        run: npm run build && npx electron-builder --mac dmg zip --${{ matrix.arch }} --publish never
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload macOS ${{ matrix.arch }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: wepi-macos-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
