name: Build Windows

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 24.13.0

jobs:
  build-windows:
    name: Windows ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate app icon
        run: npm run make-icon

      - name: Build Windows ${{ matrix.arch }} package
        run: npm run build && npx electron-builder --win nsis --${{ matrix.arch }} --publish never
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Upload Windows ${{ matrix.arch }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: wepi-windows-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.blockmap
            release/latest-win.yml
